<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TomSuz POS - Checkout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        .cart-container { position: sticky; top: 0; z-index: 1000; background: white; border-bottom: 2px solid #0056b3; }
        .product-grid { max-height: 65vh; overflow-y: auto; padding-bottom: 20px; }
        .product-btn { text-align: left; height: 100%; border-left: 4px solid #0056b3; transition: 0.2s; border-radius: 8px; }
        .product-btn:active { transform: scale(0.95); }
        #cart-display { font-size: 0.9rem; min-height: 1.5em; cursor: pointer; }
        .smaller { font-size: 0.75rem; }
    </style>
</head>
<body class="bg-light">

<div class="cart-container p-3 shadow-sm">
    <div class="d-flex justify-content-between align-items-center">
        <div>
            <h5 class="mb-0 text-muted small">Total Payable</h5>
            <h3 class="mb-0 fw-bold text-primary">K<span id="display-total">0.00</span></h3>
        </div>
        <div class="d-flex gap-2">
            <button class="btn btn-outline-danger" onclick="clearCart()" id="clear-btn" disabled>
                <i class="bi bi-trash"></i>
            </button>
            <button class="btn btn-success px-4 fw-bold shadow-sm" data-bs-toggle="modal" data-bs-target="#checkoutModal" id="checkout-btn" disabled>
                CHECKOUT
            </button>
        </div>
    </div>
    <div id="cart-display" class="text-muted mt-2 text-truncate" onclick="bootstrap.Modal.getOrCreateInstance('#cartModal').show()">
        Cart is empty (Click to view)
    </div>
</div>

<div class="container py-3">
    <div class="input-group mb-3 shadow-sm">
        <span class="input-group-text bg-white border-end-0"><i class="bi bi-search"></i></span>
        <input type="text" id="search-input" class="form-control border-start-0 ps-0" placeholder="Search product name..." autofocus>
    </div>
    
    <div class="row g-2 product-grid" id="product-list">
        {% for product in products %}
        <div class="col-6 col-md-4 product-item">
            <button class="btn btn-white w-100 product-btn shadow-sm bg-white p-2" 
                    onclick="addToCart('{{ product.id }}', '{{ product.name }}', '{{ product.selling_price }}')">
                <div class="fw-bold text-dark text-truncate">{{ product.name }}</div>
                <div class="text-primary small fw-bold">K{{ product.selling_price }}</div>
                <div class="text-muted smaller">In Stock: {{ product.stock_quantity|floatformat:0 }}</div>
            </button>
        </div>
        {% endfor %}
    </div>
</div>

<div class="modal fade" id="cartModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header"><h5>Review Cart</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body p-0">
                <ul class="list-group list-group-flush" id="cart-details-list"></ul>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="checkoutModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header border-0"><h5 class="modal-title">Complete Sale</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <h3 class="text-center mb-4">Total: K<span id="modal-total">0.00</span></h3>
                <div class="mb-3">
                    <label class="form-label fw-bold">Amount Received (K)</label>
                    <input type="number" id="amount-paid" class="form-control form-control-lg" placeholder="0.00">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Payment Method</label>
                    <select id="pay-method" class="form-select form-select-lg">
                        <option value="CASH">Cash</option>
                        <option value="MOMO">Mobile Money</option>
                        <option value="CREDIT">Store Credit</option>
                    </select>
                </div>
                <div class="alert alert-warning text-center">
                    <h4 class="mb-0">Change: K<span id="change-due">0.00</span></h4>
                </div>
            </div>
            <div class="modal-footer border-0">
                <button class="btn btn-primary w-100 py-3 fw-bold" onclick="submitSale()">FINISH SALE</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="successModal" data-bs-backdrop="static" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content text-center p-4">
            <div class="text-success mb-3"><i class="bi bi-check-circle-fill" style="font-size: 3rem;"></i></div>
            <h4>Sale Complete!</h4>
            <p class="text-muted small">Receipt options for the customer:</p>
            <div class="d-grid gap-2">
                <button class="btn btn-outline-success py-2" onclick="shareWhatsApp()"><i class="bi bi-whatsapp me-2"></i> WhatsApp</button>
                <button class="btn btn-outline-dark py-2" onclick="printReceipt()"><i class="bi bi-printer me-2"></i> Print</button>
                <hr>
                <button class="btn btn-primary" onclick="location.reload()">Next Sale</button>
            </div>
        </div>
    </div>
</div>

<script>
let cart = [];
let total = 0;
let lastSaleData = null;

// Search Functionality
document.getElementById('search-input').addEventListener('input', function(e) {
    const term = e.target.value.toLowerCase();
    document.querySelectorAll('.product-item').forEach(item => {
        const name = item.querySelector('.fw-bold').innerText.toLowerCase();
        item.style.display = name.includes(term) ? 'block' : 'none';
    });
});

function addToCart(id, name, price) {
    price = parseFloat(price);
    const existing = cart.find(item => item.id === id);
    if (existing) {
        existing.quantity += 1;
    } else {
        cart.push({ id, name, price, quantity: 1 });
    }
    updateUI();
}

function removeFromCart(id) {
    cart = cart.filter(item => item.id !== id);
    updateUI();
}

function clearCart() {
    if(confirm("Clear all items?")) {
        cart = [];
        updateUI();
    }
}

function updateUI() {
    total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
    
    // Header Display
    document.getElementById('cart-display').innerText = cart.length > 0 
        ? cart.map(item => `${item.quantity}x ${item.name}`).join(', ') 
        : "Cart is empty";
    
    document.getElementById('display-total').innerText = total.toFixed(2);
    document.getElementById('modal-total').innerText = total.toFixed(2);
    
    // Buttons state
    document.getElementById('checkout-btn').disabled = cart.length === 0;
    document.getElementById('clear-btn').disabled = cart.length === 0;

    // Detailed List for Cart Modal
    const list = document.getElementById('cart-details-list');
    list.innerHTML = cart.map(item => `
        <li class="list-group-item d-flex justify-content-between align-items-center">
            <div>
                <div class="fw-bold">${item.name}</div>
                <small class="text-muted">K${item.price} x ${item.quantity}</small>
            </div>
            <button class="btn btn-sm btn-outline-danger" onclick="removeFromCart('${item.id}')">
                <i class="bi bi-x"></i>
            </button>
        </li>
    `).join('');
}

document.getElementById('amount-paid').addEventListener('input', (e) => {
    const paid = parseFloat(e.target.value) || 0;
    document.getElementById('change-due').innerText = Math.max(0, paid - total).toFixed(2);
});

async function submitSale() {
    const paid = parseFloat(document.getElementById('amount-paid').value) || 0;
    const change = parseFloat(document.getElementById('change-due').innerText) || 0;

    const saleInfo = {
        cart: cart,
        total_amount: total,
        amount_paid: paid,
        change_due: change,
        payment_method: document.getElementById('pay-method').value
    };

    try {
        const response = await fetch('{% url "sales:pos_screen" %}', {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json', 
                'X-CSRFToken': '{{ csrf_token }}' 
            },
            body: JSON.stringify(saleInfo)
        });

        const result = await response.json();

        if (response.ok) {
            lastSaleData = saleInfo;
            bootstrap.Modal.getInstance(document.getElementById('checkoutModal')).hide();
            new bootstrap.Modal(document.getElementById('successModal')).show();
        } else {
            alert("Error: " + result.message);
        }
    } catch (err) {
        alert("Network error. Check connection.");
    }
}

function shareWhatsApp() {
    if(!lastSaleData) return;
    let msg = `*TomSuz POS Receipt*\n--------------------------\n`;
    lastSaleData.cart.forEach(i => msg += `${i.name} x${i.quantity}: K${(i.price*i.quantity).toFixed(2)}\n`);
    msg += `--------------------------\n*Total: K${lastSaleData.total_amount.toFixed(2)}*\nPaid: K${lastSaleData.amount_paid.toFixed(2)}\nChange: K${lastSaleData.change_due.toFixed(2)}\n\nThank you!`;
    window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
}

function printReceipt() {
    const win = window.open('', '', 'width=300,height=600');
    win.document.write('<body style="font-family:monospace;padding:10px;"><h3>Receipt</h3><hr>');
    lastSaleData.cart.forEach(i => win.document.write(`<p>${i.name} x${i.quantity} <br> K${(i.price*i.quantity).toFixed(2)}</p>`));
    win.document.write(`<hr><b>Total: K${lastSaleData.total_amount.toFixed(2)}</b><br>Paid: K${lastSaleData.amount_paid.toFixed(2)}</body>`);
    win.document.close();
    win.print();
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
