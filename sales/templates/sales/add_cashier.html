{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white py-3">
                    <h5 class="mb-0 text-primary"><i class="bi bi-person-plus me-2"></i>Register New Cashier</h5>
                </div>
                <div class="card-body p-4">
                    <p class="text-muted small mb-4">
                        This will create a new login for your staff. They will be automatically linked to <strong>{{ request.user.profile.store.name }}</strong>.
                    </p>

                    {% if error %}
                    <div class="alert alert-danger small">{{ error }}</div>
                    {% endif %}

                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Username</label>
                            <input type="text" name="username" class="form-control" placeholder="e.g. joshua_toms" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-bold">Temporary Password</label>
                            <input type="password" name="password" class="form-control" placeholder="Create a secure password" required>
                        </div>
                        
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">Create Account</button>
                            <a href="{% url 'sales::main_dashboard' %}" class="btn btn-link text-muted small">Cancel and Go Back</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
